storage: .verdaccio/storage

auth:
  htpasswd:
    file: .verdaccio/htpasswd
    max_users: 1000

uplinks: {}

packages:
  '@*/*':
    access: $all
    publish: $all
    unpublish: $all
  '**':
    access: $all
    publish: $all
    unpublish: $all

log:
  type: stdout
  format: pretty
  level: warn
